<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ETLERS Portal</title>
    <meta
      name="description"
      content="ETLERS에서 제공하는 서비스를 한 곳에서 진입하는 포탈입니다."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">ETLERS WEB PORTAL</p>
        <h1>이틀러스 서비스 진입 포탈</h1>
        <p class="hero-copy">
          운영 중인 웹 서비스를 한 곳에서 관리하고 접근할 수 있도록 구성한 메인
          진입 화면입니다.
        </p>
      </header>

      <main class="service-grid">
        <a class="service-card service-card-primary" href="https://ekis.etlers.com">
          <div class="service-card-head">
            <span class="service-badge">LIVE</span>
            <span class="service-arrow">Open</span>
          </div>
          <h2>EKIS</h2>
          <p>
            투자/운영 시스템으로 이동합니다. 클릭하면 EKIS 로그인 화면으로
            연결됩니다.
          </p>
        </a>

        <section class="service-card service-card-muted" aria-label="추가 서비스 영역">
          <div class="service-card-head">
            <span class="service-badge service-badge-muted">READY</span>
            <span class="service-arrow">Soon</span>
          </div>
          <h2>More Services</h2>
          <p>추가 서비스가 이 포탈에 연결될 수 있도록 확장 가능한 구조입니다.</p>
        </section>
      </main>
    </div>
  </body>
</html>
