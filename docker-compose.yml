services:
  portal:
    image: ekis_portal:latest
    build:
      context: ./portal
    container_name: etlers-portal
    restart: unless-stopped

  contact-api:
    build:
      context: ./contact_api
    image: etlers-contact-api:latest
    container_name: etlers-contact-api
    restart: unless-stopped
    environment:
      PORT: 8001
      SLACK_INFO_PATH: /app/env/slack_info.json
    volumes:
      - ./env/slack_info.json:/app/env/slack_info.json:ro

  gateway:
    image: caddy:2.8-alpine
    container_name: etlers-gateway
    restart: unless-stopped
    depends_on:
      - portal
      - contact-api
    ports:
      - "80:80"
      - "443:443"
    environment:
      ACME_EMAIL: ${ACME_EMAIL:-etlersadm@gmail.com}
      PORTAL_UPSTREAM_HOST: ${PORTAL_UPSTREAM_HOST:-portal}
      PORTAL_UPSTREAM_PORT: ${PORTAL_UPSTREAM_PORT:-80}
      EKIS_UPSTREAM_HOST: ${EKIS_UPSTREAM_HOST:-host.docker.internal}
      EKIS_UPSTREAM_PORT: ${EKIS_UPSTREAM_PORT:-8080}
      FORECAST_UPSTREAM_HOST: ${FORECAST_UPSTREAM_HOST:-host.docker.internal}
      FORECAST_UPSTREAM_PORT: ${FORECAST_UPSTREAM_PORT:-6104}
      AGENT_DEAL_UPSTREAM_HOST: ${AGENT_DEAL_UPSTREAM_HOST:-host.docker.internal}
      AGENT_DEAL_UPSTREAM_PORT: ${AGENT_DEAL_UPSTREAM_PORT:-1972}
    volumes:
      - ./gateway/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  caddy_data:
  caddy_config:
